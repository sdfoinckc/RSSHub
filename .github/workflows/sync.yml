name: RSSHub Ultimate Auto Sync (Zero Error)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/DIYgod/RSSHub.git
          git fetch upstream --prune

      - name: Detect branches safely
        run: |
          echo "Detecting branches..."

          # 获取 upstream 默认分支（main/master 自动识别）
          UPSTREAM_BRANCH=$(git remote show upstream | sed -n "/HEAD branch/s/.*: //p")

          echo "Upstream branch: $UPSTREAM_BRANCH"

          # 自动选择本地分支（不存在就创建）
          if git show-ref --verify --quiet refs/heads/main; then
            LOCAL_BRANCH="main"
          elif git show-ref --verify --quiet refs/heads/master; then
            LOCAL_BRANCH="master"
          else
            LOCAL_BRANCH="sync"
            git checkout -b sync || true
          fi

          echo "Local branch: $LOCAL_BRANCH"

          git checkout $LOCAL_BRANCH || git checkout -b $LOCAL_BRANCH

          # 安全合并 upstream
          git merge "upstream/$UPSTREAM_BRANCH" --no-edit || {
            echo "⚠️ Merge conflict detected, skipping this run safely"
            git merge --abort || true
            exit 0
          }

      - name: Push safely
        run: |
          git push origin HEAD || {
            echo "⚠️ Push failed (maybe no changes)"
            exit 0
          }
