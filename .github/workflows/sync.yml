name: Stable Sync RSSHub Upstream

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时自动同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream repo
        run: |
          git remote add upstream https://github.com/DIYgod/RSSHub.git
          git fetch upstream --prune

      - name: Detect default branch & sync
        run: |
          # 自动判断 upstream 默认分支
          UPSTREAM_BRANCH=$(git remote show upstream | sed -n "/HEAD branch/s/.*: //p")
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # 自动切换本地分支（兼容 main / master）
          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout master || git checkout -b main
          fi

          # 合并 upstream
          git merge "upstream/$UPSTREAM_BRANCH" --no-edit || {
            echo "Merge conflict detected, aborting merge"
            git merge --abort || true
            exit 0
          }

      - name: Push changes safely
        run: |
          git push origin HEAD
