name: RSSHub Zero-Branch Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (no branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ""

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/DIYgod/RSSHub.git
          git fetch upstream --prune

      - name: Sync upstream (detached HEAD mode)
        run: |
          echo "Finding upstream default branch..."

          UPSTREAM_BRANCH=$(git remote show upstream | sed -n "/HEAD branch/s/.*: //p")
          echo "Upstream branch: $UPSTREAM_BRANCH"

          echo "Resetting to upstream state..."
          git checkout --detach "upstream/$UPSTREAM_BRANCH"

          echo "Pushing directly to origin (no local branch)..."
          git push origin HEAD:refs/heads/sync --force

      - name: Done
        run: echo "Sync completed successfully"
